<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente FIATC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .azul-fiatc { color: #0055A5; }
        .bg-fiatc { background-color: #0055A5; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Navegación -->
    <nav class="p-6 bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <!-- Aquí cargamos tu logo -->
                <img src="logo-fiatc.png" alt="FIATC" class="h-10">
                <div class="h-6 w-[1px] bg-gray-200"></div>
                <span class="text-xl font-bold azul-fiatc italic tracking-tight">Assistant</span>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main class="flex-grow flex flex-col items-center justify-center px-6 text-center">
        <div class="bg-white p-10 md:p-16 rounded-3xl shadow-xl shadow-blue-100 border border-blue-50 max-w-2xl">
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-800 mb-6">
                FIATC <span class="azul-fiatc">Assitant</span>
            </h1>
            <p class="text-lg text-slate-500 mb-10 leading-relaxed">
                Accede al Gem de Jirada personalizado de FIATC para optimizar tus tareas, analizar datos y resolver dudas al instante.
            </p>
            
            <!-- Botón que abre la ventana flotante -->
            <button onclick="abrirGem()" class="bg-fiatc text-white px-12 py-5 rounded-xl font-bold text-xl shadow-lg hover:scale-105 transition-all flex items-center gap-4 mx-auto">
                <span>INICIAR ASISTENTE</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="p-10 text-center">
        <p class="text-[10px] tracking-[0.3em] font-bold text-slate-400 uppercase italic">© 2024 FIATC MUTUA DE SEGUROS</p>
    </footer>

    <script>
        function abrirGem() {
            const url = "https://gemini.google.com/gem/1LH9YAceFOV7GT3i0LDKMOHrR43rloiE9?usp=sharing";
            const width = 580;
            const height = 820;
            const left = (window.screen.width / 2) - (width / 2);
            const top = (window.screen.height / 2) - (height / 2);
            window.open(url, "FIATC_AI", `width=${width},height=${height},top=${top},left=${left},status=no,menubar=no,toolbar=no,scrollbars=yes,resizable=yes`);
        }
    </script>

</body>
</html>
