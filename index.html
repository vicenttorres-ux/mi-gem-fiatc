<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIATC x Jirada | IA Estratégica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mesh-bg {
            background-color: #ffffff;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 85, 165, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 85, 165, 0.03) 0px, transparent 50%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
    </style>
</head>
<body class="mesh-bg min-h-screen flex flex-col">

    <!-- Navegación Flotante con Co-Branding -->
    <nav class="fixed top-4 left-1/2 -translate-x-1/2 w-[90%] max-w-5xl z-50">
        <div class="glass rounded-2xl px-6 py-3 flex justify-between items-center shadow-xl">
            <!-- Bloque de Logos -->
            <div class="flex items-center gap-4">
                <!-- Logo FIATC -->
                <img src="logo-fiatc.png" alt="FIATC" class="h-8 md:h-9">
                
                <!-- Divisor -->
                <div class="h-6 w-[1px] bg-slate-300"></div>
                
                <!-- Logo Jirada -->
                <img src="logo-jirada.png" alt="Jirada" class="h-5 md:h-6">
            </div>

            <!-- Etiqueta de versión -->
            <div class="hidden sm:flex items-center gap-2">
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest border border-slate-200 px-2 py-1 rounded">Internal Tool v1.5</span>
            </div>
        </div>
    </nav>

    <!-- Contenido Hero -->
    <main class="flex-grow flex flex-col items-center justify-center px-6 pt-32 pb-20">
        <div class="max-w-4xl w-full text-center relative">
            
            <div class="fade-in inline-flex items-center gap-2 px-3 py-1 bg-blue-50 rounded-full text-[10px] font-bold text-blue-700 uppercase tracking-[0.2em] mb-10">
                Estrategia impulsada por IA
            </div>

            <h1 class="fade-in delay-1 text-5xl md:text-7xl font-extrabold text-slate-900 leading-[1.1] tracking-tighter mb-10">
             FIATC Assitant <br>
                <span class="text-blue-700 italic">by Jirada</span>
            </h1>

            <p class="fade-in delay-2 text-xl md:text-2xl text-slate-600 mb-12 max-w-3xl mx-auto leading-relaxed font-medium">
                Todo el conocimiento de FIATC en un solo chat. <br class="hidden md:block">
                <span class="text-slate-900">El consultor experto</span> que conoce nuestro ADN mejor que nadie para guiar su estrategia.
            </p>
            
            <!-- Botón -->
            <div class="fade-in delay-2">
                <button onclick="abrirGem()" class="bg-blue-700 hover:bg-blue-800 text-white px-12 py-5 rounded-2xl font-bold text-xl transition-all transform hover:-translate-y-1 shadow-2xl flex items-center gap-4 mx-auto group">
                    <span>INICIAR CONSULTORÍA</span>
                    <div class="bg-blue-600 p-1 rounded-lg group-hover:translate-x-1 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                </button>
                <p class="mt-6 text-[10px] text-slate-400 uppercase tracking-[0.3em] font-bold italic">Acceso exclusivo vía Google Gemini</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="p-12 text-center">
        <div class="flex justify-center items-center gap-6 opacity-30 grayscale mb-6">
            <img src="logo-fiatc.png" alt="FIATC" class="h-5">
            <img src="logo-jirada.png" alt="Jirada" class="h-4">
        </div>
        <p class="text-[9px] tracking-[0.5em] font-bold text-slate-400 uppercase">
            © 2024 FIATC Seguros x Jirada Digital Strategy
        </p>
    </footer>

    <script>
        function abrirGem() {
            const url = "https://gemini.google.com/gem/1LH9YAceFOV7GT3i0LDKMOHrR43rloiE9?usp=sharing";
            const width = 600;
            const height = 850;
            const left = (window.screen.width / 2) - (width / 2);
            const top = (window.screen.height / 2) - (height / 2);
            window.open(url, "FIATC_Jirada_AI", `width=${width},height=${height},top=${top},left=${left},status=no,menubar=no,toolbar=no,scrollbars=yes,resizable=yes`);
        }
    </script>

</body>
</html>
